<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picoarco | Music</title>
  <meta name="description" content="Picoarco music page" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
  <link rel="stylesheet" href="./css/music.css">
</head>
<body>
  <div class="bg_pattern polka" aria-hidden="true"></div>

  <div class="container">
    <header class="page-header">
      <h1><a href="./index.html" class="title">PICOARCO</a></h1>
      <p class="subtitle">Indie Game Studio</p>
    </header>

    <main class="music-section" aria-label="Music player section">
      <div class="player-shell">
        <div class="player">
          <div class="details">
            <div class="track-art"></div>
            <div class="track-name">Track Name</div>
          </div>

          <div class="buttons">
            <button
              type="button"
              class="prev-track player-button"
              onclick="prevTrack()"
              aria-label="Previous track"
            >
              <span class="control-icon normal" aria-hidden="true">
                <i class="fa fa-step-backward fa-2x"></i>
              </span>
              <span class="control-icon hover" aria-hidden="true">
                <i class="fa fa-step-backward fa-2x"></i>
              </span>
            </button>

            <button
              type="button"
              class="playpause-track player-button"
              onclick="playpauseTrack()"
              aria-label="Play or pause"
            >
              <span class="control-icon normal" aria-hidden="true">
                <i class="fa fa-play-circle fa-4x"></i>
              </span>
              <span class="control-icon hover" aria-hidden="true">
                <i class="fa fa-play-circle fa-4x"></i>
              </span>
            </button>

            <button
              type="button"
              class="next-track player-button"
              onclick="nextTrack()"
              aria-label="Next track"
            >
              <span class="control-icon normal" aria-hidden="true">
                <i class="fa fa-step-forward fa-2x"></i>
              </span>
              <span class="control-icon hover" aria-hidden="true">
                <i class="fa fa-step-forward fa-2x"></i>
              </span>
            </button>
          </div>

          <div class="slider_container seek-row">
            <div class="current-time">00:00</div>
            <input
              type="range"
              min="0"
              max="100"
              value="0"
              class="seek_slider"
              onchange="seekTo()"
              aria-label="Seek"
            >
            <div class="total-duration">00:00</div>
          </div>

          <div class="slider_container volume-row">
            <i class="fa fa-volume-down" aria-hidden="true"></i>
            <input
              type="range"
              min="0"
              max="100"
              value="99"
              class="volume_slider"
              onchange="setVolume()"
              aria-label="Volume"
            >
            <i class="fa fa-volume-up" aria-hidden="true"></i>
          </div>
        </div>
      </div>

      <div class="back-line" aria-hidden="true"></div>

      <a class="back-home" href="./index.html" aria-label="Back to home">
        <span class="back-img normal" aria-hidden="true"></span>
        <span class="back-img hover" aria-hidden="true"></span>
        <span class="sr-only">Back</span>
      </a>
    </main>
  </div>

  <footer>© 2026 Picoarco</footer>

  <script src="./js/music.js"></script>
</body>
</html>
